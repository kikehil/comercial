<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Segmentos</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pink:   #c0186a;
    --blue:   #1a3fa8;
    --orange: #e87c0c;
    --green:  #1a8c3c;
    --red:    #c41212;
    --bg:     transparent;
    --track-h: 4px;
  }

  body {
    background: var(--bg);
    color: #444;
    font-family: 'Nunito', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .scene {
    position: relative;
    width: 480px;
    text-align: center;
  }

  /* ---- Tagline above ---- */
  .tagline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.3em;
    color: rgba(0,0,0,0.4);
    text-transform: uppercase;
    margin-bottom: 28px;
    animation: fadeUp 0.6s ease both;
  }

  /* ---- Card stack ---- */
  .card-stack {
    position: relative;
    height: 380px;
  }

  .card {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    opacity: 0;
    transform: scale(0.88) translateY(30px);
    transition: opacity 0.55s cubic-bezier(.4,0,.2,1),
                transform 0.55s cubic-bezier(.4,0,.2,1);
    pointer-events: none;
  }

  .card.active {
    opacity: 1;
    transform: scale(1) translateY(0);
    pointer-events: auto;
  }

  .card.exit-up {
    opacity: 0;
    transform: scale(0.92) translateY(-30px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }

  /* Glow ring behind image */
  .card-img-wrap {
    position: relative;
    width: 220px;
    height: 220px;
  }

  .glow {
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    filter: blur(40px);
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  .card.active .glow { opacity: 0.45; }

  .card-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 0 20px rgba(255,255,255,0.08));
  }

  .card-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 0.08em;
    line-height: 1;
  }

  .card-desc {
    font-size: 0.85rem;
    color: rgba(0,0,0,0.5);
    letter-spacing: 0.05em;
    font-weight: 700;
    text-transform: uppercase;
  }

  /* ---- Progress bar ---- */
  .progress-bar {
    position: relative;
    height: var(--track-h);
    background: rgba(255,255,255,0.08);
    border-radius: 99px;
    margin-top: 28px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 99px;
    width: 0%;
    transition: background 0.4s ease;
  }

  @keyframes fillBar {
    from { width: 0% }
    to   { width: 100% }
  }

  .progress-fill.animating {
    animation: fillBar 3.5s linear forwards;
  }

  /* ---- Dots ---- */
  .dots {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 20px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
    cursor: pointer;
    transition: background 0.3s, transform 0.3s;
  }

  .dot.active {
    transform: scale(1.4);
  }

  /* ---- Nav arrows ---- */
  .nav {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-top: 24px;
  }

  .nav-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    color: #fff;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
  }

  .nav-btn:hover {
    background: rgba(255,255,255,0.14);
    transform: scale(1.08);
  }

  /* ---- Per-card colors ---- */
  .card[data-i="0"] .card-label { color: var(--pink); }
  .card[data-i="0"] .glow       { background: var(--pink); }
  .card[data-i="0"] .dot-ref { background: var(--pink); }

  .card[data-i="1"] .card-label { color: var(--blue); }
  .card[data-i="1"] .glow       { background: var(--blue); }

  .card[data-i="2"] .card-label { color: var(--orange); }
  .card[data-i="2"] .glow       { background: var(--orange); }

  .card[data-i="3"] .card-label { color: var(--green); }
  .card[data-i="3"] .glow       { background: var(--green); }

  .card[data-i="4"] .card-label { color: var(--red); }
  .card[data-i="4"] .glow       { background: var(--red); }

  @keyframes fadeUp {
    from { opacity:0; transform: translateY(12px); }
    to   { opacity:1; transform: translateY(0); }
  }

  /* Animated background accent */
  .bg-accent {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.06;
    pointer-events: none;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    transition: background 0.8s ease;
  }
</style>
</head>

  </div><!-- /card-stack -->

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="dots" id="dots"></div>

  <div class="nav">
    <button class="nav-btn" id="prevBtn">&#8592;</button>
    <button class="nav-btn" id="nextBtn">&#8594;</button>
  </div>
</div>

<script>
  const cards   = Array.from(document.querySelectorAll('.card'));
  const fill    = document.getElementById('progressFill');
  const dotsEl  = document.getElementById('dots');
  const bg      = document.getElementById('bgAccent');
  const COLORS  = ['#c0186a','#1a3fa8','#e87c0c','#1a8c3c','#c41212'];
  const DELAY   = 3500;
  let current   = 0;
  let timer     = null;
  let dots      = [];

  // Build dots
  cards.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot';
    d.addEventListener('click', () => goTo(i, true));
    dotsEl.appendChild(d);
    dots.push(d);
  });

  function goTo(idx, manual = false) {
    if (manual) clearInterval(timer);

    const prev = cards[current];
    prev.classList.remove('active');
    prev.classList.add('exit-up');
    setTimeout(() => prev.classList.remove('exit-up'), 500);

    dots[current].classList.remove('active');
    dots[current].style.background = 'rgba(255,255,255,0.18)';

    current = (idx + cards.length) % cards.length;

    cards[current].classList.add('active');
    dots[current].classList.add('active');
    dots[current].style.background = COLORS[current];
    bg.style.background = COLORS[current];

    // Progress bar reset
    fill.classList.remove('animating');
    fill.style.background = COLORS[current];
    void fill.offsetWidth; // reflow
    fill.classList.add('animating');

    if (manual) startAuto();
  }

  function startAuto() {
    clearInterval(timer);
    timer = setInterval(() => goTo(current + 1), DELAY);
  }

  document.getElementById('nextBtn').addEventListener('click', () => goTo(current + 1, true));
  document.getElementById('prevBtn').addEventListener('click', () => goTo(current - 1, true));

  // Init
  goTo(0);
  startAuto();
</script>
